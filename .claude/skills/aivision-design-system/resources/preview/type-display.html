<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .wrap{padding:24px 28px;font-family:var(--av-font-sans);}
  .spec{display:grid;grid-template-columns:80px 1fr;gap:16px;align-items:baseline;padding:10px 0;border-bottom:1px solid #F0F0F0;}
  .spec:last-child{border-bottom:0;}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#888;}
  .sample{color:#0A0A0A;letter-spacing:-0.02em;}
  .b{color:#3F6EE8;}
</style></head>
<body><div class="wrap">
  <div class="spec"><div class="meta">H1 · 48/1.1<br>bold · -2%</div><div class="sample" style="font-size:42px;line-height:1.1;font-weight:700;">Бизнес растёт —<br>но внутри <span class="b">хаос</span></div></div>
  <div class="spec"><div class="meta">H2 · 40/1.15<br>semibold · -1.5%</div><div class="sample" style="font-size:32px;line-height:1.15;font-weight:600;letter-spacing:-0.015em;">Если бизнес растёт, но управляемости нет</div></div>
  <div class="spec"><div class="meta">H3 · 24/1.3<br>bold</div><div class="sample" style="font-size:22px;line-height:1.3;font-weight:700;">Система управляемой прибыли</div></div>
</div></body></html>
