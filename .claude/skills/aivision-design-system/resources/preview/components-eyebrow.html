<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Eyebrow pattern</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .wrap{padding:24px 28px;font-family:var(--av-font-sans);display:flex;flex-direction:column;gap:20px;}
  .block{padding:16px;border:1px solid #E8E8E8;background:#F4F4F5;}
  .block.dark{background:#0A0A0A;border-color:#2A2A2A;}
  .eb{display:inline-flex;align-items:center;gap:12px;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.15em;}
  .eb::before{content:"";width:24px;height:1px;background:currentColor;}
  .h{font-size:20px;font-weight:700;color:#0A0A0A;margin-top:10px;line-height:1.2;}
  .h-dark{color:#fff;}
  .blue{color:#3F6EE8;}
  .red{color:#E5484D;}
  .black{color:#0A0A0A;}
</style></head>
<body><div class="wrap">
  <div class="block"><span class="eb blue">Продукты</span><div class="h">Три уровня системы</div></div>
  <div class="block"><span class="eb red">Проблема</span><div class="h">Если бизнес растёт, но управляемости нет</div></div>
  <div class="block dark"><span class="eb blue">Диагностика</span><div class="h h-dark">Оставьте контакт</div></div>
</div></body></html>
