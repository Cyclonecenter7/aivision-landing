<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Grid & Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .wrap{padding:22px 24px;font-family:var(--av-font-sans);}
  .label{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#999;font-weight:600;margin-bottom:12px;}
  .grid-demo{height:90px;background:#F0F2F5;background-image:linear-gradient(#E0E4EA 1px,transparent 1px),linear-gradient(90deg,#E0E4EA 1px,transparent 1px);background-size:20px 20px;border:1px solid #E8E8E8;}
  .scale{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:14px;}
  .step{display:flex;flex-direction:column;gap:4px;align-items:flex-start;}
  .bar{background:#3F6EE8;height:8px;}
  .n{font-size:10px;font-weight:600;color:#0A0A0A;}
  .u{font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#888;}
</style></head>
<body><div class="wrap">
  <div class="label">Blueprint grid · 40×40 @ 40% opacity on hero</div>
  <div class="grid-demo"></div>
  <div class="label" style="margin-top:18px;">Spacing scale · 4px base</div>
  <div class="scale">
    <div class="step"><div class="bar" style="width:4px;"></div><div class="n">1<div class="u">4</div></div></div>
    <div class="step"><div class="bar" style="width:8px;"></div><div class="n">2<div class="u">8</div></div></div>
    <div class="step"><div class="bar" style="width:12px;"></div><div class="n">3<div class="u">12</div></div></div>
    <div class="step"><div class="bar" style="width:16px;"></div><div class="n">4<div class="u">16</div></div></div>
    <div class="step"><div class="bar" style="width:24px;"></div><div class="n">6<div class="u">24</div></div></div>
    <div class="step"><div class="bar" style="width:32px;"></div><div class="n">8<div class="u">32</div></div></div>
    <div class="step"><div class="bar" style="width:48px;"></div><div class="n">12<div class="u">48</div></div></div>
    <div class="step"><div class="bar" style="width:64px;"></div><div class="n">16<div class="u">64</div></div></div>
  </div>
</div></body></html>
