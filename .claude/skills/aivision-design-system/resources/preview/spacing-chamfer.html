<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Chamfer System</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .wrap{padding:22px 24px;font-family:var(--av-font-sans);}
  .label{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#999;font-weight:600;margin-bottom:14px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:end;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .block{width:100%;height:72px;background:#3F6EE8;}
  .spec{font-size:10px;color:#0A0A0A;font-weight:600;text-align:center;}
  .val{font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#888;font-weight:400;margin-top:2px;}
  .sm{clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);}
  .md{clip-path:polygon(0 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%);}
  .lg{clip-path:polygon(0 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%);}
  .xl{clip-path:polygon(0 0,100% 0,100% calc(100% - 20px),calc(100% - 20px) 100%,0 100%);}
  .xxl{clip-path:polygon(0 0,100% 0,100% calc(100% - 28px),calc(100% - 28px) 100%,0 100%);}
</style></head>
<body><div class="wrap">
  <div class="label">Signature geometry — bottom-right chamfer</div>
  <div class="row">
    <div class="cell"><div class="block sm"></div><div class="spec">sm<div class="val">10px · chip</div></div></div>
    <div class="cell"><div class="block md"></div><div class="spec">md<div class="val">12px · badge</div></div></div>
    <div class="cell"><div class="block lg"></div><div class="spec">lg<div class="val">16px · button</div></div></div>
    <div class="cell"><div class="block xl"></div><div class="spec">xl<div class="val">20px · card</div></div></div>
    <div class="cell"><div class="block xxl"></div><div class="spec">2xl<div class="val">28px · modal</div></div></div>
  </div>
</div></body></html>
