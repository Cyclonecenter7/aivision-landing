<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Eyebrow + Kicker</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .wrap{padding:24px 28px;font-family:var(--av-font-sans);display:flex;flex-direction:column;gap:18px;}
  .row{display:grid;grid-template-columns:110px 1fr;gap:16px;align-items:center;}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#888;}
  .eyebrow{display:inline-flex;align-items:center;gap:12px;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.15em;}
  .eyebrow::before{content:"";width:24px;height:1px;background:currentColor;}
  .blue{color:#3F6EE8;}
  .red{color:#E5484D;}
  .black{color:#0A0A0A;}
  .kicker{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;color:#999;}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="meta">eyebrow<br>blue · 12/500</div><div><span class="eyebrow blue">Продукты</span></div></div>
  <div class="row"><div class="meta">eyebrow<br>red</div><div><span class="eyebrow red">Проблема</span></div></div>
  <div class="row"><div class="meta">eyebrow<br>black</div><div><span class="eyebrow black">Отличие</span></div></div>
  <div class="row"><div class="meta">kicker<br>10/600 · .15em</div><div><span class="kicker">Результат</span></div></div>
  <div class="row"><div class="meta">kicker<br>muted</div><div><span class="kicker" style="color:#AAA">Статистика по дням · Апрель</span></div></div>
</div></body></html>
