<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}

  .label{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#999;font-weight:600;margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;background:#F4F4F5;border:1px solid #E8E8E8;padding:14px 8px;}
  .cell svg{width:22px;height:22px;color:#3F6EE8;}
  .n{font-size:9px;color:#666;font-family:ui-monospace,Menlo,monospace;}
  .meta{margin-top:14px;font-size:11px;color:#666;line-height:1.55;}
  .meta b{color:#0A0A0A;}
</style></head>
