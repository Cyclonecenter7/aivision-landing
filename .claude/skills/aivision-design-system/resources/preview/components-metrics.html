<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Metric blocks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F4F4F5;}
  .wrap{padding:22px 24px;font-family:var(--av-font-sans);display:flex;flex-direction:column;gap:14px;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .m-card{background:#fff;border:1px solid #E8E8E8;padding:12px 14px;}
  .k{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#AAA;font-weight:600;margin-bottom:4px;}
  .v{font-size:22px;font-weight:700;letter-spacing:-0.01em;line-height:1.1;}
  .d{font-size:11px;font-weight:600;margin-top:2px;}
  .blue{color:#3F6EE8;}
  .red{color:#E5484D;}
  .green{color:#16a34a;}
  .hero{background:#3F6EE8;padding:18px 20px;display:flex;justify-content:space-between;align-items:end;}
  .hero-v{color:#fff;font-size:44px;font-weight:900;letter-spacing:-0.03em;line-height:1;opacity:.92;}
  .hero-l{color:rgba(255,255,255,.45);font-size:10px;text-transform:uppercase;letter-spacing:.15em;text-align:right;line-height:1.5;}
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="m-card"><div class="k">Маржа</div><div class="v green">376 185 ₽</div><div class="d green">+93%</div></div>
    <div class="m-card"><div class="k">Оборот</div><div class="v blue">649 351 ₽</div><div class="d blue">+9%</div></div>
    <div class="m-card"><div class="k">Расходы</div><div class="v red">273 166 ₽</div><div class="d red">−32%</div></div>
  </div>
  <div class="hero"><div class="hero-v">+93%</div><div class="hero-l">рост маржи<br>за 2 месяца</div></div>
</div></body></html>
